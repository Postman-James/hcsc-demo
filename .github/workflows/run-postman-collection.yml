name: Run Postman Collection

'on':
  push:
    branches:
      - '**'

jobs:
  collection-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Postman CLI
        run: |
          curl -fsSL https://dl-cli.pstmn.io/install/linux64.sh | sh
          echo "$HOME/.postman/bin" >> "$GITHUB_PATH"

      - name: Verify Postman CLI installation
        run: postman --version

      - name: Run collection
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
        run: |
          mkdir -p .tmp
          python3 - <<'PY'
          from pathlib import Path
          import re

          src = Path('postman/environments/Local.environment.yaml')
          dst = Path('.tmp/ci.environment.yaml')
          text = src.read_text()
          text = re.sub(r'(key:\s*clientId\s*\n\s*value:\s*).+', r'\1' + ("${{ secrets.CLIENT_ID }}"), text)
          text = re.sub(r'(key:\s*clientSecret\s*\n\s*value:\s*).+', r'\1' + ("${{ secrets.CLIENT_SECRET }}"), text)
          dst.write_text(text)
          PY
          postman collection run "postman/collections/HCSC Member Portal - API Orchestration" \
            -e .tmp/ci.environment.yaml
