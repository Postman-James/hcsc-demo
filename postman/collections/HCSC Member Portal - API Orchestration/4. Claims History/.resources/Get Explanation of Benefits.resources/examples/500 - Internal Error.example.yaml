$kind: http-example
request:
  url: "{{fhirBaseUrl}}/ExplanationOfBenefit?patient=Patient/{{patientId}}&_sort=-created&_count=10"
  method: GET
  headers:
    Authorization: Bearer {{accessToken}}
    Accept: application/fhir+json
  queryParams:
    patient: Patient/{{patientId}}
    _sort: -created
    _count: "10"
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/fhir+json
  body:
    type: json
    content: |-
      {
        "resourceType": "OperationOutcome",
        "issue": [
          {
            "severity": "fatal",
            "code": "exception",
            "diagnostics": "Claims processing engine returned an unexpected error. Adjudication service may be undergoing maintenance. Request ID: req-9a2f6e31"
          }
        ]
      }
order: 3000
