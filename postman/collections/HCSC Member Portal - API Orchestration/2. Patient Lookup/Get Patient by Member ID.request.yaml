$kind: http-request
description: Look up a member by their HCSC member ID. Returns FHIR Patient
  resource with demographics, identifiers, and links to related resources.
url: "{{fhirBaseUrl}}/Patient?identifier=HCSC-MBR-100234"
method: GET
headers:
  Authorization: Bearer {{accessToken}}
  Accept: application/fhir+json
queryParams:
  identifier: HCSC-MBR-100234
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });


      pm.test("Patient found and ID stored", function () {
          var bundle = pm.response.json();
          pm.expect(bundle.resourceType).to.eql("Bundle");
          pm.expect(bundle.entry).to.be.an("array").that.is.not.empty;

          var patient = bundle.entry[0].resource;
          pm.collectionVariables.set("patientId", patient.id);
          console.log("Patient: " + patient.name[0].given[0] + " " + patient.name[0].family);
          console.log("Patient ID: " + patient.id);
      });
    language: text/javascript
examples: ./.resources/Get Patient by Member ID.resources/examples
order: 1000
