$kind: http-example
request:
  url: "{{fhirBaseUrl}}/auth/token"
  method: POST
  headers:
    Content-Type: application/x-www-form-urlencoded
  body:
    type: urlencoded
    content:
      grant_type: client_credentials
      client_id: "{{clientId}}"
      client_secret: "{{clientSecret}}"
      scope: patient/*.read
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "access_token": "",
        "token_type": "Bearer",
        "expires_in": 3600,
        "scope": "patient/*.read"
      }
order: 1000
