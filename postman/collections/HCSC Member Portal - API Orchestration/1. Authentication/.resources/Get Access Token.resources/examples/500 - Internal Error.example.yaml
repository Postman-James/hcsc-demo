$kind: http-example
request:
  url: "{{fhirBaseUrl}}/auth/token"
  method: POST
  headers:
    Content-Type: application/x-www-form-urlencoded
  body:
    type: urlencoded
    content:
      grant_type: client_credentials
      client_id: "{{clientId}}"
      client_secret: "{{clientSecret}}"
      scope: patient/*.read
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "resourceType": "OperationOutcome",
        "issue": [
          {
            "severity": "fatal",
            "code": "exception",
            "diagnostics": "Authorization service unavailable. Contact system administrator."
          }
        ]
      }
order: 3000
