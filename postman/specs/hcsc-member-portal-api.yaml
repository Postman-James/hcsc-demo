openapi: 3.1.0
info:
  title: HCSC Member Portal API
  description: 'FHIR R4-based API for Health Care Service Corporation member portal
    operations. Supports patient lookup, coverage verification, claims history, and
    provider network search across HCSC''s five operating states (IL, TX, NM, OK,
    MT).

    '
  version: 1.0.0
  contact:
    name: HCSC Interoperability Team
    url: 'https://www.hcsc.com/contact-us'
    email: 'interop@hcsc.com'
servers:
- url: http://127.0.0.1:4500
  description: Local Mock (Postman built-in)
- url: http://127.0.0.1:4501
  description: Local Enhanced Mock (dynamic responses)
- url: https://825f1a38-58e2-45ba-ac0f-e5deee2a9ad4.mock.pstmn.io
  description: Postman Cloud Mock
tags:
- name: Authentication
  description: OAuth2 client credentials token exchange
- name: Patient
  description: FHIR Patient resource lookup
- name: Coverage
  description: Member coverage and benefits
- name: Claims
  description: Explanation of Benefits (EOB) records
- name: Providers
  description: In-network provider search
paths:
  /auth/token:
    post:
      operationId: getAccessToken
      summary: Get Access Token
      description: OAuth2 client credentials flow. Returns an access token for all
        subsequent FHIR API calls.
      tags:
      - Authentication
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
              - grant_type
              - client_id
              - client_secret
              properties:
                grant_type:
                  type: string
                  description: OAuth2 grant type for the token request.
                  enum:
                  - client_credentials
                  example: client_credentials
                client_id:
                  type: string
                  description: Client identifier issued to the calling application.
                  example: demo-client-id
                client_secret:
                  type: string
                  description: Client secret associated with the client identifier.
                  format: password
                  example: demo-client-secret
                scope:
                  type: string
                  description: Requested OAuth scope string for permitted FHIR access.
                  example: patient/*.read
      responses:
        '200':
          description: Token issued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              example:
                access_token: mock-access-token
                token_type: Bearer
                expires_in: 3600
                scope: patient/*.read
        '404':
          description: Client application not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
              example:
                resourceType: OperationOutcome
                issue:
                - severity: error
                  code: not-found
                  diagnostics: Client application was not found for the supplied credentials.
        '500':
          description: Authorization service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
              example:
                resourceType: OperationOutcome
                issue:
                - severity: fatal
                  code: exception
                  diagnostics: Authorization service is temporarily unavailable.
  /Patient:
    get:
      operationId: getPatientByMemberId
      summary: Get Patient by Member ID
      description: Look up a member by their HCSC member ID. Returns a FHIR Bundle
        containing the Patient resource with demographics, identifiers, and organization
        links.
      tags:
      - Patient
      security:
      - bearerAuth: []
      parameters:
      - name: identifier
        example: HCSC-IL-100001
        in: query
        required: true
        description: HCSC member ID (e.g., HCSC-IL-100001)
        schema:
          type: string
          example: HCSC-IL-100001
      responses:
        '200':
          description: Patient found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientBundle'
              example:
                resourceType: Bundle
                type: searchset
                total: 1
                entry:
                - fullUrl: https://api.hcsc.com/fhir/Patient/pat-8827341
                  resource:
                    resourceType: Patient
                    id: pat-8827341
                    identifier:
                    - system: https://hcsc.com/member-id
                      value: HCSC-IL-100001
                    name:
                    - use: official
                      family: Doe
                      given:
                      - Jane
                    gender: female
                    birthDate: '1985-04-12'
                    address:
                    - use: home
                      line:
                      - 123 Main St
                      city: Chicago
                      state: IL
                      postalCode: '60601'
                    telecom:
                    - system: phone
                      value: 312-555-0101
                      use: mobile
                    managingOrganization:
                      reference: Organization/hcsc-il
                      display: HCSC Illinois
        '404':
          description: No patient found for the given identifier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
              example:
                resourceType: OperationOutcome
                issue:
                - severity: error
                  code: not-found
                  diagnostics: No patient matched the supplied member identifier.
        '500':
          description: Patient index service error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
              example:
                resourceType: OperationOutcome
                issue:
                - severity: fatal
                  code: exception
                  diagnostics: Patient index service encountered an unexpected error.
  /Coverage:
    get:
      operationId: getMemberCoverage
      summary: Get Member Coverage
      description: Retrieve active coverage for a patient. Returns plan details, coverage
        period, network information, payor, and cost-to-beneficiary data.
      tags:
      - Coverage
      security:
      - bearerAuth: []
      parameters:
      - name: beneficiary
        example: Patient/pat-8827341
        in: query
        required: true
        description: FHIR Patient reference (e.g., Patient/pat-1234567)
        schema:
          type: string
          example: Patient/pat-8827341
      - name: status
        example: active
        in: query
        required: false
        description: Filter by coverage status
        schema:
          type: string
          enum:
          - active
          - cancelled
          - draft
          - entered-in-error
          default: active
          example: active
      responses:
        '200':
          description: Coverage records returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoverageBundle'
              example:
                resourceType: Bundle
                type: searchset
                total: 1
                entry:
                - fullUrl: https://api.hcsc.com/fhir/Coverage/cov-100045
                  resource:
                    resourceType: Coverage
                    id: cov-100045
                    status: active
                    type:
                      coding:
                      - system: http://terminology.hl7.org/CodeSystem/v3-ActCode
                        code: EHCPOL
                        display: extended healthcare
                    subscriberId: HCSC-IL-100001
                    beneficiary:
                      reference: Patient/pat-8827341
                      display: Jane Doe
                    period:
                      start: '2025-01-01'
                      end: '2025-12-31'
                    payor:
                    - reference: Organization/hcsc-il
                      display: HCSC Illinois
                    class:
                    - type: group
                      value: GRP-2048
                      name: Premier PPO Group
                    costToBeneficiary:
                    - type: deductible
                      valueQuantity:
                        value: 1500
                        currency: USD
        '404':
          description: No active coverage found for patient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
              example:
                resourceType: OperationOutcome
                issue:
                - severity: error
                  code: not-found
                  diagnostics: No active coverage was found for the specified patient.
        '500':
          description: Coverage eligibility service error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
              example:
                resourceType: OperationOutcome
                issue:
                - severity: fatal
                  code: exception
                  diagnostics: Coverage eligibility service is temporarily unavailable.
  /ExplanationOfBenefit:
    get:
      operationId: getExplanationOfBenefits
      summary: Get Explanation of Benefits
      description: Retrieve EOB records for a patient. Returns claims with provider,
        diagnosis, procedure codes, and payment details. Supports sorting and pagination.
      tags:
      - Claims
      security:
      - bearerAuth: []
      parameters:
      - name: patient
        example: Patient/pat-8827341
        in: query
        required: true
        description: FHIR Patient reference
        schema:
          type: string
          example: Patient/pat-8827341
      - name: _sort
        example: -created
        in: query
        required: false
        description: Sort field (prefix with - for descending)
        schema:
          type: string
          example: -created
      - name: _count
        example: 10
        in: query
        required: false
        description: Maximum number of results to return
        schema:
          type: integer
          default: 10
          example: 10
      responses:
        '200':
          description: Claims history returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EOBBundle'
              example:
                resourceType: Bundle
                type: searchset
                total: 1
                entry:
                - fullUrl: https://api.hcsc.com/fhir/ExplanationOfBenefit/eob-778899
                  resource:
                    resourceType: ExplanationOfBenefit
                    id: eob-778899
                    status: active
                    outcome: complete
                    patient:
                      reference: Patient/pat-8827341
                      display: Jane Doe
                    provider:
                      reference: Practitioner/prac-4455
                      display: Dr. Alex Smith
                    created: '2025-02-14'
                    diagnosis:
                    - diagnosisCodeableConcept:
                        coding:
                        - system: http://hl7.org/fhir/sid/icd-10-cm
                          code: J20.9
                          display: Acute bronchitis, unspecified
                    item:
                    - sequence: 1
                      productOrService:
                        coding:
                        - system: http://www.ama-assn.org/go/cpt
                          code: '99213'
                          display: Office outpatient visit
                      adjudicationAmount:
                        value: 125
                        currency: USD
                    total:
                    - category: submitted
                      amount:
                        value: 125
                        currency: USD
        '404':
          description: No claims history found for patient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
              example:
                resourceType: OperationOutcome
                issue:
                - severity: error
                  code: not-found
                  diagnostics: No claims history was found for the specified patient.
        '500':
          description: Claims processing engine error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
              example:
                resourceType: OperationOutcome
                issue:
                - severity: fatal
                  code: exception
                  diagnostics: Claims processing engine returned an unexpected error.
  /PractitionerRole:
    get:
      operationId: findInNetworkProviders
      summary: Find In-Network Providers
      description: Search for in-network providers by network ID and specialty. Returns
        practitioners with roles, locations, qualifications, and availability.
      tags:
      - Providers
      security:
      - bearerAuth: []
      parameters:
      - name: organization.partof.identifier
        example: NET-IL-PPO-PRIME
        in: query
        required: true
        description: Network identifier from coverage (e.g., NET-IL-PPO-PRIME)
        schema:
          type: string
          example: NET-IL-PPO-PRIME
      - name: specialty
        example: 208D00000X
        in: query
        required: false
        description: Provider taxonomy code (NUCC)
        schema:
          type: string
          example: 208D00000X
      - name: _include
        example: PractitionerRole:practitioner
        in: query
        required: false
        description: Include referenced resources
        schema:
          type: string
          example: PractitionerRole:practitioner
      - name: _count
        example: 20
        in: query
        required: false
        description: Maximum number of results
        schema:
          type: integer
          default: 20
          example: 20
      responses:
        '200':
          description: Providers found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PractitionerRoleBundle'
              example:
                resourceType: Bundle
                type: searchset
                total: 1
                entry:
                - fullUrl: https://api.hcsc.com/fhir/PractitionerRole/role-3321
                  resource:
                    resourceType: PractitionerRole
                    id: role-3321
                    practitioner:
                      reference: Practitioner/prac-4455
                      display: Dr. Alex Smith
                    organization:
                      reference: Organization/clinic-204
                      display: Lakeside Family Clinic
                    specialty:
                    - coding:
                      - system: http://nucc.org/provider-taxonomy
                        code: 208D00000X
                        display: General Practice Physician
                    location:
                    - reference: Location/loc-100
                      display: Lakeside Family Clinic - Downtown
                    telecom:
                    - system: phone
                      value: 312-555-0199
                      use: work
                    availableTime:
                    - daysOfWeek:
                      - mon
                      - tue
                      - wed
                      availableStartTime: 08:00:00
                      availableEndTime: '17:00:00'
        '404':
          description: No providers found for network
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
              example:
                resourceType: OperationOutcome
                issue:
                - severity: error
                  code: not-found
                  diagnostics: No in-network providers matched the requested network
                    and specialty.
        '500':
          description: Provider directory service error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationOutcome'
              example:
                resourceType: OperationOutcome
                issue:
                - severity: fatal
                  code: exception
                  diagnostics: Provider directory service is temporarily unavailable.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Access token from /auth/token endpoint
  schemas:
    Identifier:
      type: object
      description: Business identifier with a defining system and value.
      properties:
        system:
          $ref: '#/components/schemas/IdentifierSystem'
        value:
          $ref: '#/components/schemas/IdentifierValue'
    HumanName:
      type: object
      description: Structured representation of a person name.
      properties:
        use:
          $ref: '#/components/schemas/NameUse'
        family:
          $ref: '#/components/schemas/FamilyName'
        given:
          $ref: '#/components/schemas/GivenNames'
        prefix:
          $ref: '#/components/schemas/NamePrefixes'
    Address:
      type: object
      description: Structured postal address.
      properties:
        use:
          $ref: '#/components/schemas/AddressUse'
        line:
          $ref: '#/components/schemas/AddressLines'
        city:
          $ref: '#/components/schemas/CityName'
        state:
          $ref: '#/components/schemas/StateCode'
        postalCode:
          $ref: '#/components/schemas/PostalCode'
    ContactPoint:
      type: object
      description: Contact method such as phone, fax, or email.
      properties:
        system:
          $ref: '#/components/schemas/ContactSystem'
        value:
          $ref: '#/components/schemas/ContactValue'
        use:
          $ref: '#/components/schemas/ContactUse'
    Reference:
      type: object
      description: Reference to another FHIR resource.
      properties:
        reference:
          $ref: '#/components/schemas/ReferenceString'
        display:
          $ref: '#/components/schemas/DisplayText'
    BundleEntryPatient:
      type: object
      description: Wrapper for a single Patient resource in a bundle.
      properties:
        fullUrl:
          $ref: '#/components/schemas/FullUrl'
        resource:
          $ref: '#/components/schemas/Patient'
          description: Patient resource that matched the query.
    BundleEntryCoverage:
      type: object
      description: Wrapper for a single Coverage resource in a bundle.
      properties:
        fullUrl:
          $ref: '#/components/schemas/FullUrl'
        resource:
          $ref: '#/components/schemas/Coverage'
          description: Coverage resource that matched the query.
    Coding:
      type: object
      description: Code from a terminology system with optional human-readable text.
      properties:
        system:
          $ref: '#/components/schemas/CodingSystem'
        code:
          $ref: '#/components/schemas/CodingCode'
        display:
          $ref: '#/components/schemas/CodingDisplay'
    CodeableConcept:
      type: object
      description: Concept that may be defined by one or more codings.
      properties:
        coding:
          $ref: '#/components/schemas/CodingArray'
    Period:
      type: object
      description: Time range defined by a start and end date.
      properties:
        start:
          $ref: '#/components/schemas/PeriodStartDate'
        end:
          $ref: '#/components/schemas/PeriodEndDate'
    Money:
      type: object
      description: Monetary amount with a currency code.
      properties:
        value:
          $ref: '#/components/schemas/MoneyValue'
        currency:
          $ref: '#/components/schemas/CurrencyCode'
    CoverageClass:
      type: object
      description: Classification detail such as group, plan, or network.
      properties:
        type:
          $ref: '#/components/schemas/CodeableConcept'
          description: Codeable concept describing the class category.
        value:
          $ref: '#/components/schemas/CoverageClassValue'
        name:
          $ref: '#/components/schemas/CoverageClassName'
    CostToBeneficiary:
      type: object
      description: Individual deductible, copay, or coinsurance entry.
      properties:
        type:
          $ref: '#/components/schemas/CodeableConcept'
          description: Codeable concept describing the cost-sharing category.
        valueMoney:
          $ref: '#/components/schemas/Money'
          description: Monetary value for the member cost responsibility.
    BundleEntryExplanationOfBenefit:
      type: object
      description: Wrapper for a single ExplanationOfBenefit resource in a bundle.
      properties:
        resource:
          $ref: '#/components/schemas/ExplanationOfBenefit'
          description: ExplanationOfBenefit resource that matched the query.
    Diagnosis:
      type: object
      description: Single diagnosis record linked to the explanation of benefit.
      properties:
        sequence:
          $ref: '#/components/schemas/SequenceNumber'
        diagnosisCodeableConcept:
          $ref: '#/components/schemas/CodeableConcept'
          description: Diagnosis code or concept applied to the claim.
    ClaimItem:
      type: object
      description: Individual billed service or product entry.
      properties:
        sequence:
          $ref: '#/components/schemas/ClaimSequenceNumber'
        productOrService:
          $ref: '#/components/schemas/CodeableConcept'
          description: Codeable concept that identifies the billed service or product.
        servicedDate:
          $ref: '#/components/schemas/ServicedDate'
        net:
          $ref: '#/components/schemas/Money'
          description: Submitted net amount for the billed service.
    TotalAmount:
      type: object
      description: Total amount categorized by benefit calculation type.
      properties:
        category:
          $ref: '#/components/schemas/CodeableConcept'
          description: Codeable concept identifying the total category.
        amount:
          $ref: '#/components/schemas/Money'
          description: Monetary amount for the total category.
    Payment:
      type: object
      description: Payment details associated with the adjudicated claim.
      properties:
        amount:
          $ref: '#/components/schemas/Money'
          description: Payment amount issued for the claim.
        date:
          $ref: '#/components/schemas/PaymentDate'
    BundleEntryPractitionerResource:
      type: object
      description: Wrapper for a single practitioner-related resource in a bundle.
      properties:
        resource:
          $ref: '#/components/schemas/PractitionerResourceReference'
    Specialty:
      type: object
      description: Specialty concept assigned to the practitioner role.
      properties:
        coding:
          $ref: '#/components/schemas/CodingArray'
    AvailableTime:
      type: object
      description: Availability window for one or more days of the week.
      properties:
        daysOfWeek:
          $ref: '#/components/schemas/DaysOfWeek'
        availableStartTime:
          $ref: '#/components/schemas/AvailableStartTime'
        availableEndTime:
          $ref: '#/components/schemas/AvailableEndTime'
    Qualification:
      type: object
      description: Single qualification entry for the practitioner.
      properties:
        code:
          $ref: '#/components/schemas/CodeableConcept'
          description: Codeable concept describing the qualification.
        issuer:
          $ref: '#/components/schemas/Reference'
          description: Organization that issued the qualification.
    OperationOutcome:
      type: object
      description: FHIR OperationOutcome for error responses
      properties:
        resourceType:
          $ref: '#/components/schemas/FHIRResourceTypeOperationOutcome'
        issue:
          $ref: '#/components/schemas/OperationOutcomeIssueArray'
    TokenResponse:
      type: object
      description: OAuth2 token response returned after successful client authentication.
      properties:
        access_token:
          $ref: '#/components/schemas/AccessToken'
        token_type:
          $ref: '#/components/schemas/TokenType'
        expires_in:
          $ref: '#/components/schemas/ExpiresIn'
        scope:
          $ref: '#/components/schemas/OAuthScope'
    PatientBundle:
      type: object
      description: FHIR Bundle containing one or more Patient resources that match
        the search criteria.
      properties:
        resourceType:
          $ref: '#/components/schemas/FHIRResourceTypeBundle'
        type:
          $ref: '#/components/schemas/BundleTypeSearchset'
        total:
          $ref: '#/components/schemas/BundleTotal'
        entry:
          $ref: '#/components/schemas/PatientEntryArray'
    Patient:
      type: object
      description: FHIR Patient resource describing a member's demographic and contact
        information.
      properties:
        resourceType:
          $ref: '#/components/schemas/FHIRResourceTypePatient'
        id:
          $ref: '#/components/schemas/PatientId'
        identifier:
          $ref: '#/components/schemas/IdentifierArray'
        name:
          $ref: '#/components/schemas/HumanNameArray'
          description: Human names recorded for the patient.
        gender:
          $ref: '#/components/schemas/AdministrativeGender'
        birthDate:
          $ref: '#/components/schemas/BirthDate'
        address:
          $ref: '#/components/schemas/AddressArray'
          description: Postal addresses recorded for the patient.
        telecom:
          $ref: '#/components/schemas/ContactPointArray'
          description: Contact methods such as phone numbers or email addresses.
        managingOrganization:
          $ref: '#/components/schemas/Reference'
          description: Organization responsible for maintaining the patient record.
    CoverageBundle:
      type: object
      description: FHIR Bundle containing coverage records returned for a patient
        eligibility search.
      properties:
        resourceType:
          $ref: '#/components/schemas/FHIRResourceTypeBundle'
        type:
          $ref: '#/components/schemas/BundleTypeSearchset'
        total:
          $ref: '#/components/schemas/BundleTotal'
        entry:
          $ref: '#/components/schemas/CoverageEntryArray'
    Coverage:
      type: object
      description: FHIR Coverage resource describing a member's insurance plan and
        benefit details.
      properties:
        resourceType:
          $ref: '#/components/schemas/FHIRResourceTypeCoverage'
        id:
          $ref: '#/components/schemas/CoverageId'
        status:
          $ref: '#/components/schemas/CoverageStatus'
        type:
          $ref: '#/components/schemas/CodeableConcept'
          description: Benefit classification for the member coverage.
        subscriber:
          $ref: '#/components/schemas/Reference'
          description: Party who owns or subscribes to the coverage.
        period:
          $ref: '#/components/schemas/Period'
          description: Time range during which the coverage is effective.
        payor:
          $ref: '#/components/schemas/ReferenceArray'
          description: Organizations financially responsible for the coverage.
        class:
          $ref: '#/components/schemas/CoverageClassArray'
          description: Coverage classifications (group, plan, network)
        costToBeneficiary:
          $ref: '#/components/schemas/CostToBeneficiaryArray'
    EOBBundle:
      type: object
      description: FHIR Bundle containing ExplanationOfBenefit resources for a member's
        claims history.
      properties:
        resourceType:
          $ref: '#/components/schemas/FHIRResourceTypeBundle'
        type:
          $ref: '#/components/schemas/BundleTypeSearchset'
        total:
          $ref: '#/components/schemas/BundleTotal'
        entry:
          $ref: '#/components/schemas/ExplanationOfBenefitEntryArray'
    ExplanationOfBenefit:
      type: object
      description: FHIR ExplanationOfBenefit resource summarizing adjudicated claim
        and payment information.
      properties:
        resourceType:
          $ref: '#/components/schemas/FHIRResourceTypeExplanationOfBenefit'
        id:
          $ref: '#/components/schemas/ExplanationOfBenefitId'
        status:
          $ref: '#/components/schemas/ExplanationOfBenefitStatus'
        type:
          $ref: '#/components/schemas/ExplanationOfBenefitType'
        use:
          $ref: '#/components/schemas/ExplanationOfBenefitUse'
        patient:
          $ref: '#/components/schemas/Reference'
          description: Patient to whom the explanation of benefit applies.
        created:
          $ref: '#/components/schemas/ExplanationOfBenefitCreated'
        insurer:
          $ref: '#/components/schemas/Reference'
          description: Organization responsible for adjudicating the claim.
        provider:
          $ref: '#/components/schemas/Reference'
          description: Rendering or billing provider associated with the claim.
        outcome:
          $ref: '#/components/schemas/ExplanationOfBenefitOutcome'
        diagnosis:
          $ref: '#/components/schemas/DiagnosisArray'
        item:
          $ref: '#/components/schemas/ClaimItemArray'
        total:
          $ref: '#/components/schemas/TotalAmountArray'
        payment:
          $ref: '#/components/schemas/Payment'
          description: Payment details associated with the adjudicated claim.
    PractitionerRoleBundle:
      type: object
      description: FHIR Bundle containing provider directory search results for practitioner
        roles.
      properties:
        resourceType:
          $ref: '#/components/schemas/FHIRResourceTypeBundle'
        type:
          $ref: '#/components/schemas/BundleTypeSearchset'
        total:
          $ref: '#/components/schemas/BundleTotal'
        entry:
          $ref: '#/components/schemas/PractitionerResourceEntryArray'
    PractitionerRole:
      type: object
      description: FHIR PractitionerRole resource describing a provider's specialty,
        organization, and availability.
      properties:
        resourceType:
          $ref: '#/components/schemas/FHIRResourceTypePractitionerRole'
        id:
          $ref: '#/components/schemas/PractitionerRoleId'
        practitioner:
          $ref: '#/components/schemas/Reference'
          description: Practitioner associated with the role.
        organization:
          $ref: '#/components/schemas/Reference'
